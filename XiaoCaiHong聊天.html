<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>小彩虹 · 视频通话版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body { background: #f1f5f9; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
        .phone-frame { max-width: 480px; width: 100%; background: white; border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); overflow: hidden; padding: 24px 20px; position: relative; }
        
        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .header h1 { font-size: 24px; font-weight: 650; color: #0f172a; display: flex; align-items: center; gap: 6px; }
        .badge { background: #dbeafe; color: #1e40af; padding: 4px 12px; border-radius: 40px; font-size: 13px; }
        #conn-status { margin-left: auto; font-size: 13px; background: #e2e8f0; padding: 4px 10px; border-radius: 40px; }
        
        .id-row { background: #f8fafc; border-radius: 30px; padding: 5px; display: flex; align-items: center; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .id-row input { flex: 1; background: transparent; border: none; padding: 12px 18px; font-size: 15px; outline: none; }
        .id-row button { background: #2563eb; border: none; color: white; padding: 10px 24px; border-radius: 30px; font-weight: 600; cursor: pointer; margin-right: 5px; }
        .id-row button:hover { background: #1d4ed8; }
        .id-row button:disabled { background: #94a3b8; cursor: not-allowed; }

        .main-tabs { display: flex; gap: 12px; margin-bottom: 20px; }
        .main-tab { flex: 1; padding: 14px 0; border: 1.5px solid #e2e8f0; background: white; border-radius: 40px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .main-tab.active { background: #2563eb; border-color: #2563eb; color: white; }

        .private-panel { background: #f8fafc; border-radius: 24px; padding: 16px; margin-bottom: 16px; }
        .private-panel input { width: 100%; padding: 14px 18px; border: 1px solid #cbd5e1; border-radius: 30px; font-size: 15px; margin-bottom: 12px; }
        .chip-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip { background: white; border: 1px solid #cbd5e1; border-radius: 40px; padding: 8px 18px; font-size: 14px; cursor: pointer; }
        .chip:hover { background: #dbeafe; }

        .group-panel { background: #f8fafc; border-radius: 24px; padding: 16px; margin-bottom: 16px; display: none; }
        .group-list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .add-group-btn { background: #7c3aed; color: white; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 20px; cursor: pointer; }
        
        .group-list-container { max-height: 280px; overflow-y: auto; border-radius: 20px; background: white; padding: 8px; }
        .group-list-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-radius: 20px; cursor: pointer; margin-bottom: 4px; }
        .group-list-item:hover { background: #f1f5f9; }
        .group-list-item.active { background: #ede9fe; border-left: 5px solid #7c3aed; }
        .group-info { display: flex; align-items: center; gap: 12px; }
        .group-avatar { width: 40px; height: 40px; background: #7c3aed; border-radius: 16px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }

        .current-target { background: #f1f4f9; border-radius: 30px; padding: 10px 18px; margin: 16px 0; display: flex; align-items: center; gap: 8px; border-left: 4px solid #2563eb; }
        .reconnect-info { background: #fee2e2; color: #b91c1c; padding: 8px 16px; border-radius: 30px; font-size: 13px; margin-top: 8px; display: none; }
        
        /* 通话条 */
        .call-bar { display: flex; align-items: center; justify-content: space-between; background: #1e293b; color: white; padding: 10px 18px; border-radius: 40px; margin-bottom: 16px; }
        .call-bar span { font-weight: 500; }
        .call-actions { display: flex; gap: 16px; }
        .call-btn { background: #334155; border: none; color: white; width: 42px; height: 42px; border-radius: 50%; font-size: 20px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: 0.2s; }
        .call-btn.accept { background: #22c55e; }
        .call-btn.reject { background: #ef4444; }
        .call-btn.video { background: #3b82f6; }
        .call-btn:hover { filter: brightness(1.2); }

        /* 视频容器 (悬浮层) */
        .video-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .video-container { width: 100%; max-width: 500px; background: #0f172a; border-radius: 32px; padding: 20px; position: relative; }
        .video-grid { display: flex; flex-direction: column; gap: 10px; }
        .video-large { background: #1e293b; width: 100%; aspect-ratio: 4/3; border-radius: 24px; overflow: hidden; position: relative; }
        .video-small { position: absolute; bottom: 20px; right: 20px; width: 120px; aspect-ratio: 3/4; background: #334155; border-radius: 20px; border: 3px solid white; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; background: #1e1e1e; }
        .video-controls { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .video-controls button { background: #ef4444; border: none; color: white; font-size: 18px; padding: 12px 30px; border-radius: 40px; font-weight: 600; cursor: pointer; }

        #chat-box { background: #f3f4f6; border-radius: 32px; padding: 20px; height: 220px; overflow-y: auto; margin: 20px 0; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 80%; padding: 12px 18px; border-radius: 24px; word-break: break-word; font-size: 14px; }
        .my-message { background: #2563eb; color: white; align-self: flex-end; }
        .other-message { background: white; color: #0f172a; align-self: flex-start; border: 1px solid #e2e8f0; }

        .input-row { display: flex; gap: 10px; margin-top: 10px; }
        .input-row input { flex: 1; padding: 16px 20px; border: 1px solid #cbd5e1; border-radius: 40px; font-size: 15px; outline: none; }
        .input-row button { width: 60px; height: 60px; border-radius: 40px; background: #2563eb; color: white; border: none; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="header">
            <h1>🌈 视频通话版</h1>
            <span class="badge">私聊/群聊视频</span>
            <span id="conn-status">⚪ 离线</span>
        </div>

        <div class="id-row">
            <input type="text" id="myId" placeholder="你的ID" value="小彩虹">
            <button id="connectBtn" onclick="connect()">连接</button>
        </div>

        <!-- 通话条 (动态显示) -->
        <div id="callBar" class="call-bar" style="display: none;">
            <span id="callStatus">📞 邀请中...</span>
            <div class="call-actions" id="callActions"></div>
        </div>

        <div class="main-tabs">
            <div class="main-tab active" onclick="switchMode('private')">👤 私聊</div>
            <div class="main-tab" onclick="switchMode('group')">👥 群聊</div>
        </div>

        <!-- 重连状态显示 -->
        <div id="reconnectInfo" class="reconnect-info">
            ⚠️ 检测到网络波动，正在重连... (第 <span id="reconnectCount">0</span> 次)
        </div>

        <div id="privatePanel" class="private-panel">
            <input type="text" id="privateTarget" placeholder="输入对方ID" value="朋友">
            <div class="chip-container">
                <span class="chip" onclick="setPrivateTarget('朋友')">朋友</span>
                <span class="chip" onclick="setPrivateTarget('同学')">同学</span>
            </div>
        </div>

        <div id="groupPanel" class="group-panel">
            <div class="group-list-header">
                <span>📋 我的群聊</span>
                <button class="add-group-btn" onclick="showAddGroup()">+</button>
            </div>
            <div class="group-list-container" id="groupListContainer"></div>
        </div>

        <div class="current-target">
            <span class="label">当前聊天:</span>
            <span class="value" id="currentTargetValue">私聊: 朋友</span>
            <button id="startCallBtn" class="call-btn video" style="margin-left: auto;" onclick="initiateCall()">📞</button>
        </div>

        <div id="chat-box"></div>

        <div class="input-row">
            <input type="text" id="msgInput" placeholder="输入消息..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">📨</button>
        </div>
    </div>

    <!-- 视频通话悬浮层 -->
    <div id="videoOverlay" class="video-overlay">
        <div class="video-container">
            <div class="video-grid">
                <div class="video-large">
                    <video id="remoteVideo" autoplay playsinline></video>
                </div>
                <div class="video-small">
                    <video id="localVideo" autoplay playsinline muted></video>
                </div>
            </div>
            <div class="video-controls">
                <button id="endCallBtn" onclick="endCall()">结束通话</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <!-- 简单信令 + WebRTC 适配 -->
    <script>
        (function() {
            // --- 全局状态 ---
            let client = null;
            let myId = "";
            let currentMode = 'private';
            let currentTarget = '朋友';
            
            // 重连控制
            let reconnectAttempts = 0;
            let reconnectTimer = null;
            let isManualDisconnect = false;
            
            // 群组数据
            let groupList = [
                { name: 'group:家庭', displayName: '家庭' },
                { name: 'group:朋友', displayName: '朋友' }
            ];
            
            // WebRTC 相关
            let peerConnection = null;
            let localStream = null;
            let remoteStream = null;
            let callActive = false;
            let callInitiator = false;   // 是否为主叫方
            let pendingCallTarget = null; // 等待响应的目标
            let callType = null;           // 'private' or 'group'

            // DOM 元素
            const chatBox = document.getElementById('chat-box');
            const tips = document.getElementById('tips') || createTips();
            const myIdInput = document.getElementById('myId');
            const msgInput = document.getElementById('msgInput');
            const connStatus = document.getElementById('conn-status');
            const connectBtn = document.getElementById('connectBtn');
            const reconnectInfo = document.getElementById('reconnectInfo');
            const reconnectCount = document.getElementById('reconnectCount');
            const privateTargetInput = document.getElementById('privateTarget');
            const startCallBtn = document.getElementById('startCallBtn');
            const callBar = document.getElementById('callBar');
            const callStatus = document.getElementById('callStatus');
            const callActions = document.getElementById('callActions');
            const videoOverlay = document.getElementById('videoOverlay');
            const localVideo = document.getElementById('localVideo');
            const remoteVideo = document.getElementById('remoteVideo');
            
            // 创建提示区域
            function createTips() {
                const div = document.createElement('div');
                div.id = 'tips';
                div.style.background = '#fff7ed';
                div.style.padding = '12px 18px';
                div.style.borderRadius = '20px';
                div.style.margin = '16px 0';
                document.querySelector('.current-target').after(div);
                return div;
            }

            function showTip(msg, isError = false) {
                tips.innerHTML = msg;
                tips.style.background = isError ? '#fee2e2' : '#fff7ed';
                tips.style.color = isError ? '#b91c1c' : '#7b341e';
            }

            function appendMessage(content, senderName = '', isSelf = false) {
                const div = document.createElement('div');
                div.className = `message ${isSelf ? 'my-message' : 'other-message'}`;
                if (senderName) {
                    div.innerHTML = `<div style="font-size:12px; font-weight:600; margin-bottom:4px;">${senderName}</div>${content}`;
                } else {
                    div.innerText = content;
                }
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight;
            }

            function resetReconnectCounter() {
                reconnectAttempts = 0;
                reconnectCount.innerText = '0';
                reconnectInfo.style.display = 'none';
                if (reconnectTimer) {
                    clearTimeout(reconnectTimer);
                    reconnectTimer = null;
                }
            }

            function safeCloseOldConnection() {
                if (client) {
                    isManualDisconnect = true;
                    try {
                        client.removeAllListeners();
                        client.end(true, () => {});
                    } catch (e) {}
                    client = null;
                    resetReconnectCounter();
                    setTimeout(() => { isManualDisconnect = false; }, 100);
                }
            }

            // 信令发送
            function sendSignal(targetId, type, payload = {}) {
                if (!client || !client.connected) return false;
                const topic = `chat/${targetId}`;
                const data = JSON.stringify({
                    from: myId,
                    type: 'signal',
                    signalType: type,
                    ...payload
                });
                client.publish(topic, data, { qos: 1 });
                return true;
            }

            // 发起通话
            window.initiateCall = async function() {
                if (!client || !client.connected) { showTip('请先连接', true); return; }
                if (callActive) { showTip('通话中', true); return; }
                if (currentMode === 'group') { showTip('群聊视频暂用私聊信令演示', true); return; } // 简化：只做私聊

                const target = privateTargetInput.value.trim();
                if (!target) { showTip('指定通话对象', true); return; }
                if (target === myId) { showTip('不能和自己通话', true); return; }

                try {
                    // 获取本地流
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    localVideo.srcObject = localStream;
                    
                    // 创建 RTCPeerConnection (使用免费STUN)
                    peerConnection = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
                    localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
                    
                    peerConnection.ontrack = (event) => {
                        remoteVideo.srcObject = event.streams[0];
                    };
                    
                    peerConnection.onicecandidate = (event) => {
                        if (event.candidate) {
                            sendSignal(target, 'ice-candidate', { candidate: event.candidate });
                        }
                    };

                    // 创建offer
                    const offer = await peerConnection.createOffer();
                    await peerConnection.setLocalDescription(offer);
                    
                    // 发送offer信令
                    sendSignal(target, 'offer', { offer: peerConnection.localDescription, fromMode: currentMode });
                    
                    callActive = true;
                    callInitiator = true;
                    pendingCallTarget = target;
                    callType = 'private';
                    
                    // 显示通话条
                    callBar.style.display = 'flex';
                    callStatus.innerText = `📞 呼叫 ${target}...`;
                    callActions.innerHTML = `<button class="call-btn reject" onclick="rejectCall()">✖</button>`;
                    videoOverlay.style.display = 'flex'; // 显示视频窗口
                    
                } catch (err) {
                    showTip('无法获取摄像头/麦克风', true);
                }
            };

            // 接听通话 (由信令触发)
            async function acceptCall(from, offer) {
                if (callActive) {
                    sendSignal(from, 'busy');
                    return;
                }
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    localVideo.srcObject = localStream;
                    
                    peerConnection = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
                    localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
                    
                    peerConnection.ontrack = (event) => {
                        remoteVideo.srcObject = event.streams[0];
                    };
                    peerConnection.onicecandidate = (event) => {
                        if (event.candidate) {
                            sendSignal(from, 'ice-candidate', { candidate: event.candidate });
                        }
                    };
                    
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    
                    sendSignal(from, 'answer', { answer: peerConnection.localDescription });
                    
                    callActive = true;
                    callInitiator = false;
                    pendingCallTarget = from;
                    videoOverlay.style.display = 'flex';
                    callBar.style.display = 'flex';
                    callStatus.innerText = `📞 与 ${from} 通话中`;
                    callActions.innerHTML = `<button class="call-btn reject" onclick="endCall()">挂断</button>`;
                } catch (e) {
                    showTip('接听失败', true);
                }
            }

            // 结束通话
            window.endCall = function() {
                if (peerConnection) peerConnection.close();
                if (localStream) localStream.getTracks().forEach(t => t.stop());
                localVideo.srcObject = null;
                remoteVideo.srcObject = null;
                peerConnection = null;
                localStream = null;
                callActive = false;
                callInitiator = false;
                pendingCallTarget = null;
                videoOverlay.style.display = 'none';
                callBar.style.display = 'none';
                if (client && client.connected && pendingCallTarget) {
                    sendSignal(pendingCallTarget, 'hangup');
                }
            };

            window.rejectCall = function() {
                if (pendingCallTarget) {
                    sendSignal(pendingCallTarget, 'reject');
                }
                endCall();
            };

            // 连接服务器
            window.connect = function() {
                const newId = myIdInput.value.trim();
                if (!newId) { showTip('❌ 填写你的ID', true); return; }
                
                connectBtn.disabled = true;
                connectBtn.innerText = '连接中...';
                safeCloseOldConnection();
                myId = newId;
                connStatus.innerText = '🟡 连接中';
                showTip('⏳ 正在连接服务器...');

                client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {
                    clientId: "user_" + myId + "_" + Math.random().toString(36).substring(7),
                    clean: true,
                    keepalive: 30,
                    reconnectPeriod: 0,
                    connectTimeout: 30000,
                });

                client.on('connect', () => {
                    connStatus.innerText = '🟢 在线';
                    connectBtn.disabled = false;
                    connectBtn.innerText = '连接';
                    resetReconnectCounter();
                    
                    client.subscribe(`chat/${myId}`, { qos: 1 }, (err) => {
                        if (!err) {
                            showTip('✅ 连接成功');
                            appendMessage(`🌈 欢迎 ${myId}`, '系统消息');
                        }
                    });
                    groupList.forEach(group => {
                        client.subscribe(`chat/${group.name}`, { qos: 1 });
                    });
                });

                client.on('error', () => {
                    connStatus.innerText = '🔴 错误';
                    connectBtn.disabled = false;
                    connectBtn.innerText = '重连';
                });

                client.on('close', () => {
                    if (!isManualDisconnect) {
                        connStatus.innerText = '⚪ 离线';
                        reconnectAttempts++;
                        reconnectCount.innerText = reconnectAttempts;
                        reconnectInfo.style.display = 'block';
                        const delay = Math.min(30, Math.pow(2, reconnectAttempts)) * 1000;
                        reconnectTimer = setTimeout(() => {
                            if (!client && !isManualDisconnect) connect();
                        }, delay);
                    }
                });

                // 核心：处理信令消息
                client.on('message', (topic, payload) => {
                    try {
                        const data = JSON.parse(payload.toString());
                        if (data.type === 'signal') {
                            const { from, signalType, offer, answer, candidate } = data;
                            if (from === myId) return;

                            // 处理各种信令
                            if (signalType === 'offer') {
                                // 有来电，显示接听按钮
                                callBar.style.display = 'flex';
                                callStatus.innerText = `📞 ${from} 邀请你视频`;
                                callActions.innerHTML = `
                                    <button class="call-btn accept" onclick="acceptCall('${from}', ${JSON.stringify(offer).replace(/"/g, '&quot;')})">✓</button>
                                    <button class="call-btn reject" onclick="rejectCall()">✖</button>
                                `;
                                pendingCallTarget = from;
                            }
                            else if (signalType === 'answer' && callInitiator && pendingCallTarget === from) {
                                peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                                callStatus.innerText = `📞 与 ${from} 通话中`;
                                callActions.innerHTML = `<button class="call-btn reject" onclick="endCall()">挂断</button>`;
                            }
                            else if (signalType === 'ice-candidate' && peerConnection) {
                                peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                            }
                            else if (signalType === 'reject' && callInitiator) {
                                showTip(`❌ ${from} 拒绝了通话`);
                                endCall();
                            }
                            else if (signalType === 'busy') {
                                showTip(`⏸️ ${from} 正忙`);
                                endCall();
                            }
                            else if (signalType === 'hangup') {
                                showTip('对方已挂断');
                                endCall();
                            }
                        } else {
                            // 普通文本消息
                            const { from, msg } = data;
                            if (from === myId) return;
                            const isGroup = topic.startsWith('chat/group:');
                            if (isGroup) {
                                const groupName = topic.replace('chat/', '');
                                const displayName = groupName.replace('group:', '');
                                appendMessage(msg, `👥 ${from} 在 ${displayName}`);
                            } else {
                                appendMessage(msg, `👤 ${from} 私聊`);
                            }
                        }
                    } catch (e) {}
                });
            };

            // 发送文本消息
            window.send = function() {
                if (!client || !client.connected) { showTip('❌ 未连接', true); return; }
                const msg = msgInput.value.trim();
                if (!msg) return;

                let target = '';
                let isGroup = false;
                if (currentMode === 'private') {
                    target = privateTargetInput.value.trim();
                    if (!target) { showTip('填写对方ID', true); return; }
                } else {
                    target = currentTarget;
                    isGroup = true;
                }

                const topic = `chat/${target}`;
                const payload = JSON.stringify({ from: myId, msg });
                client.publish(topic, payload, { qos: 1 }, (err) => {
                    if (!err) {
                        const displayName = isGroup ? target.replace('group:', '') : target;
                        appendMessage(msg, `我 发给 ${displayName}`, true);
                        msgInput.value = '';
                    }
                });
            };

            window.switchMode = function(mode) {
                currentMode = mode;
                document.querySelectorAll('.main-tab').forEach(tab => {
                    tab.classList.toggle('active', tab.textContent.includes(mode === 'private' ? '私聊' : '群聊'));
                });
                document.getElementById('privatePanel').style.display = mode === 'private' ? 'block' : 'none';
                document.getElementById('groupPanel').style.display = mode === 'group' ? 'block' : 'none';
                updateCurrentTarget();
            };

            window.setPrivateTarget = function(id) {
                privateTargetInput.value = id;
                currentTarget = id;
                updateCurrentTarget();
            };

            function updateCurrentTarget() {
                const value = document.getElementById('currentTargetValue');
                if (currentMode === 'private') {
                    value.innerText = `私聊: ${privateTargetInput.value}`;
                } else {
                    value.innerText = `群聊: ${currentTarget.replace('group:', '')}`;
                }
            }

            function renderGroupList() {
                const container = document.getElementById('groupListContainer');
                let html = '';
                groupList.forEach(group => {
                    const isActive = currentMode === 'group' && currentTarget === group.name;
                    html += `<div class="group-list-item ${isActive ? 'active' : ''}" onclick="selectGroup('${group.name}')"><div class="group-info"><div class="group-avatar">${group.displayName.charAt(0)}</div><span>${group.displayName}</span></div></div>`;
                });
                container.innerHTML = html;
            }

            window.selectGroup = function(groupName) {
                currentTarget = groupName;
                updateCurrentTarget();
                renderGroupList();
            };

            window.showAddGroup = function() {
                const name = prompt('输入群名称:');
                if (name) {
                    const fullName = name.startsWith('group:') ? name : 'group:' + name;
                    groupList.push({ name: fullName, displayName: name });
                    renderGroupList();
                    if (client && client.connected) {
                        client.subscribe(`chat/${fullName}`, { qos: 1 });
                    }
                }
            };

            renderGroupList();
            updateCurrentTarget();
            window.addEventListener('beforeunload', () => {
                if (client) { isManualDisconnect = true; client.end(true); }
            });
        })();
    </script>
</body>
</html>
