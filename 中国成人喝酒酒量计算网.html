<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国成年人饮酒量标准计算器</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            background-color: #f5f5f5;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            color: #2c3e50;
            text-align: center;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .input-group {
            margin: 15px 0;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #34495e;
        }
        select, input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px 0;
        }
        button:hover {
            background-color: #2980b9;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f4fd;
            border-radius: 5px;
            display: none;
        }
        .warning {
            color: #e74c3c;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>中国居民饮酒量标准计算器</h2>
        <p>依据《中国居民膳食指南（2022）》制定，结合不同年龄段代谢能力差异，计算每日安全饮酒量</p>
        
        <div class="input-group">
            <label for="gender">性别</label>
            <select id="gender">
                <option value="male">男性</option>
                <option value="female">女性</option>
            </select>
        </div>

        <div class="input-group">
            <label for="age">年龄</label>
            <input type="number" id="age" min="18" placeholder="请输入18及以上年龄" required>
        </div>

        <div class="input-group">
            <label for="alcoholContent">酒精度数（%）</label>
            <input type="number" id="alcoholContent" min="0.5" max="98" step="0.1" placeholder="例如：4.5（啤酒）、12（红酒）、52（白酒）" required>
        </div>

        <button onclick="calculateDrinkingAmount()">计算每日安全饮用量</button>

        <div class="warning">
            禁忌提示：儿童青少年、孕妇、乳母及慢性病患者严禁饮酒
        </div>

        <div class="result" id="result">
            <h3>计算结果</h3>
            <p id="resultContent"></p>
            <p id="note"></p>
        </div>
    </div>

    <script>
        function calculateDrinkingAmount() {
            const gender = document.getElementById('gender').value;
            const age = parseInt(document.getElementById('age').value);
            const alcoholContent = parseFloat(document.getElementById('alcoholContent').value);
            const result = document.getElementById('result');
            const resultContent = document.getElementById('resultContent');
            const note = document.getElementById('note');

            // 基础酒精摄入量标准（单位：克）
            let maxAlcohol;
            let ageDesc;

            if (age < 18) {
                alert('未成年人严禁饮酒！');
                result.style.display = 'none';
                return;
            } else if (age >= 18 && age <= 59) {
                // 18 - 59岁成年人标准
                maxAlcohol = gender === 'male' ? 25 : 15;
                ageDesc = '18 - 59岁成年人';
            } else if (age >= 60 && age <= 110) {
                // 60岁及以上老年人标准，代谢下降减量
                maxAlcohol = gender === 'male' ? 15 : 10;
                ageDesc = '60岁及以上老年人';
            } else {
                // 超110岁按极端情况处理，建议不饮酒
                resultContent.textContent = `您输入的年龄${age}岁远超正常寿命范围，身体机能无法代谢酒精，建议滴酒不沾。`;
                note.textContent = '';
                result.style.display = 'block';
                return;
            }

            // 计算安全饮用量：饮用量（毫升）= 酒精上限（克）÷ 酒精度数（%）× 100
            const safeAmount = (maxAlcohol / alcoholContent * 100).toFixed(1);

            // 结果展示
            resultContent.textContent = `${ageDesc}（${gender === 'male' ? '男性' : '女性'}）每日安全饮用量为：${safeAmount}毫升（对应纯酒精${maxAlcohol}克）`;
            
            // 补充说明
            if (age >= 60) {
                note.textContent = '备注：老年人肝脏解毒能力下降，建议优先选择低度酒，避免空腹饮酒，服药期间严禁饮酒。';
            } else {
                note.textContent = '备注：饮酒有害健康，此为最大限量，建议尽量减少饮酒频次或不饮酒。';
            }

            result.style.display = 'block';
        }
    </script>
</body>
</html>
