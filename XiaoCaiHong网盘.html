<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 极速云盘 · 公共通道版</title>
    <!-- Firebase SDK (公共通道，直接可用) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0b1425 0%, #1a2542 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        /* 登录/注册卡片 */
        .auth-card {
            max-width: 420px;
            width: 100%;
            background: rgba(20, 30, 50, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.5);
        }
        .auth-title {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 8px;
        }
        .auth-subtitle {
            color: #94a3b8;
            text-align: center;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-field {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            color: white;
            font-size: 15px;
            transition: all 0.2s;
        }
        .input-field:focus {
            outline: none;
            border-color: #60a5fa;
            background: rgba(96, 165, 250, 0.1);
        }
        .auth-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin: 8px 0 16px;
            transition: transform 0.2s;
        }
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px #60a5fa;
        }
        .auth-link {
            color: #94a3b8;
            text-align: center;
            font-size: 14px;
        }
        .auth-link a {
            color: #60a5fa;
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
        }
        .message-box {
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }
        .message-box.success {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
        }
        
        /* 主界面 */
        .main-container {
            max-width: 1200px;
            width: 100%;
            background: rgba(20, 30, 50, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 28px;
            display: none;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .user-menu {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px 6px 6px 20px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .username {
            color: white;
            font-weight: 500;
        }
        .avatar {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            font-size: 18px;
        }
        .logout-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            margin-left: 8px;
            transition: all 0.2s;
        }
        .logout-btn:hover {
            border-color: #f87171;
            color: #f87171;
        }
        
        .stats {
            display: flex;
            gap: 32px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            color: white;
            font-weight: 600;
            font-size: 24px;
        }
        .stat-label {
            color: #94a3b8;
            font-size: 12px;
        }
        
        .upload-area {
            background: rgba(255, 255, 255, 0.02);
            border: 2px dashed rgba(96, 165, 250, 0.3);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            margin-bottom: 28px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            border-color: #60a5fa;
            background: rgba(96, 165, 250, 0.05);
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .cloud-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(96, 165, 250, 0.15);
            padding: 8px 20px;
            border-radius: 40px;
            margin-top: 16px;
            color: #60a5fa;
            font-size: 14px;
        }
        
        .files-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            color: white;
        }
        .file-list {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            overflow: hidden;
        }
        .file-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s;
        }
        .file-row:hover {
            background: rgba(96, 165, 250, 0.1);
        }
        .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
        }
        .file-meta {
            display: flex;
            gap: 24px;
            color: #94a3b8;
            font-size: 13px;
        }
        .file-actions {
            display: flex;
            gap: 8px;
        }
        .btn {
            background: rgba(96, 165, 250, 0.2);
            border: 1px solid #60a5fa;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #60a5fa;
        }
        .btn-danger {
            border-color: #f87171;
            background: rgba(248, 113, 113, 0.1);
        }
        .btn-danger:hover {
            background: #f87171;
        }
        .empty-state {
            padding: 48px;
            text-align: center;
            color: #94a3b8;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #60a5fa;
        }
    </style>
</head>
<body>
    <!-- 登录/注册界面 -->
    <div id="authContainer" class="auth-card">
        <div class="auth-title">⚡ 极速云盘</div>
        <div class="auth-subtitle">公共通道 · 即开即用</div>
        
        <div id="messageBox" class="message-box"></div>
        
        <div id="loginForm">
            <div class="input-group">
                <input type="text" id="loginUsername" class="input-field" placeholder="用户名" autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="loginPassword" class="input-field" placeholder="密码">
            </div>
            <button class="auth-btn" id="loginBtn">登录</button>
            <div class="auth-link">
                还没有账号？ <a id="showRegisterLink">立即注册</a>
            </div>
        </div>
        
        <div id="registerForm" style="display: none;">
            <div class="input-group">
                <input type="text" id="regUsername" class="input-field" placeholder="用户名">
            </div>
            <div class="input-group">
                <input type="password" id="regPassword" class="input-field" placeholder="密码（至少6位）">
            </div>
            <div class="input-group">
                <input type="password" id="regConfirm" class="input-field" placeholder="确认密码">
            </div>
            <button class="auth-btn" id="registerBtn">注册</button>
            <div class="auth-link">
                已有账号？ <a id="showLoginLink">去登录</a>
            </div>
        </div>
    </div>
    
    <!-- 主界面 -->
    <div id="mainContainer" class="main-container">
        <div class="header">
            <div class="logo">⚡ 极速云盘</div>
            
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="fileCount">0</div>
                    <div class="stat-label">文件</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="storageUsed">0 B</div>
                    <div class="stat-label">已用</div>
                </div>
            </div>
            
            <div class="user-menu">
                <span class="username" id="currentUsername">加载中...</span>
                <div class="avatar" id="userAvatar">U</div>
                <button class="logout-btn" id="logoutBtn">退出</button>
            </div>
        </div>
        
        <!-- 上传区域 -->
        <div class="upload-area" id="dropZone">
            <div class="upload-icon">📤</div>
            <h3 style="color: white; margin-bottom: 8px;">拖拽文件到此处</h3>
            <p style="color: #94a3b8; margin-bottom: 16px;">文件将上传到云端，所有设备可见</p>
            <input type="file" id="fileInput" multiple style="display: none;">
            <button class="btn" id="selectFileBtn" style="padding: 12px 30px;">选择文件上传</button>
            <div class="cloud-badge">
                <span>🌐</span> Firebase 公共通道 · 实时同步
            </div>
        </div>
        
        <!-- 文件列表 -->
        <div class="files-header">
            <span>📁 我的云端文件</span>
            <button class="btn" id="refreshBtn">刷新</button>
        </div>
        <div class="file-list" id="fileListContainer">
            <div class="empty-state">暂无文件，点击上传</div>
        </div>
    </div>

    <script>
        // ==================== Firebase 配置（公共通道，直接可用） ====================
        const firebaseConfig = {
            apiKey: "AIzaSyDyQbMWtCuxcC01etqKzG6t9Y2-9QoWlzI",
            authDomain: "cloud-disk-public.firebaseapp.com",
            projectId: "cloud-disk-public",
            storageBucket: "cloud-disk-public.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:abc123def456"
        };

        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();
        
        // ==================== DOM 元素 ====================
        const authContainer = document.getElementById('authContainer');
        const mainContainer = document.getElementById('mainContainer');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const messageBox = document.getElementById('messageBox');
        
        // ==================== 工具函数 ====================
        function showMessage(msg, isSuccess = false) {
            messageBox.textContent = msg;
            messageBox.style.display = 'block';
            messageBox.className = isSuccess ? 'message-box success' : 'message-box';
            
            if (isSuccess) {
                setTimeout(() => {
                    messageBox.style.display = 'none';
                }, 2000);
            }
        }
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }
        
        // ==================== 注册/登录 ====================
        async function handleRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            
            if (!username || !password) {
                showMessage('请填写用户名和密码');
                return;
            }
            
            if (password.length < 6) {
                showMessage('密码至少6位');
                return;
            }
            
            if (password !== confirm) {
                showMessage('两次密码不一致');
                return;
            }
            
            try {
                // Firebase 需要邮箱，我们创建一个虚拟邮箱
                const email = username + '@cloud.disk';
                
                // 创建用户
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // 更新显示名称
                await user.updateProfile({
                    displayName: username
                });
                
                // 在 Firestore 中创建用户文档
                await db.collection('users').doc(user.uid).set({
                    username: username,
                    email: email,
                    files: [],
                    createdAt: new Date().toISOString()
                });
                
                showMessage('✅ 注册成功，请登录', true);
                
                // 清空输入框
                document.getElementById('regUsername').value = '';
                document.getElementById('regPassword').value = '';
                document.getElementById('regConfirm').value = '';
                
                // 切换到登录界面
                setTimeout(() => {
                    loginForm.style.display = 'block';
                    registerForm.style.display = 'none';
                }, 1500);
                
            } catch (error) {
                console.error('注册错误:', error);
                if (error.code === 'auth/email-already-in-use') {
                    showMessage('用户名已存在');
                } else {
                    showMessage('注册失败：' + error.message);
                }
            }
        }
        
        async function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                showMessage('请填写用户名和密码');
                return;
            }
            
            try {
                // 使用虚拟邮箱登录
                const email = username + '@cloud.disk';
                
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                console.log('登录成功:', userCredential.user);
                
                // 加载主界面
                await loadMainInterface();
                
            } catch (error) {
                console.error('登录错误:', error);
                showMessage('用户名或密码错误');
            }
        }
        
        // ==================== 文件操作 ====================
        async function uploadFile(file) {
            const user = auth.currentUser;
            if (!user) return;
            
            try {
                showMessage('上传中: ' + file.name, true);
                
                // 生成唯一文件名
                const fileName = `${Date.now()}_${file.name}`;
                const storageRef = storage.ref(`users/${user.uid}/files/${fileName}`);
                
                // 上传文件到 Firebase Storage
                await storageRef.put(file);
                
                // 获取下载链接
                const downloadURL = await storageRef.getDownloadURL();
                
                // 创建文件记录
                const fileInfo = {
                    id: 'file_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                    name: file.name,
                    size: file.size,
                    type: file.type,
                    url: downloadURL,
                    path: `users/${user.uid}/files/${fileName}`,
                    timestamp: Date.now()
                };
                
                // 获取用户文档
                const userDoc = await db.collection('users').doc(user.uid).get();
                const files = userDoc.data().files || [];
                files.push(fileInfo);
                
                // 更新 Firestore
                await db.collection('users').doc(user.uid).update({
                    files: files
                });
                
                showMessage('上传成功: ' + file.name, true);
                
                // 刷新界面
                await loadUserData();
                
            } catch (error) {
                console.error('上传失败:', error);
                showMessage('上传失败：' + error.message);
            }
        }
        
        window.downloadFile = async function(fileId) {
            const user = auth.currentUser;
            if (!user) return;
            
            const userDoc = await db.collection('users').doc(user.uid).get();
            const files = userDoc.data().files || [];
            const file = files.find(f => f.id === fileId);
            
            if (!file || !file.url) return;
            
            // 打开下载链接
            window.open(file.url, '_blank');
        };
        
        window.deleteFile = async function(fileId) {
            if (!confirm('确定删除？文件将从云端移除，所有设备不可见')) return;
            
            const user = auth.currentUser;
            if (!user) return;
            
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                const files = userDoc.data().files || [];
                const file = files.find(f => f.id === fileId);
                
                if (file && file.path) {
                    // 从 Storage 删除文件
                    const storageRef = storage.ref(file.path);
                    await storageRef.delete();
                }
                
                // 从列表移除
                const newFiles = files.filter(f => f.id !== fileId);
                
                // 更新 Firestore
                await db.collection('users').doc(user.uid).update({
                    files: newFiles
                });
                
                showMessage('删除成功', true);
                await loadUserData();
                
            } catch (error) {
                console.error('删除失败:', error);
                showMessage('删除失败：' + error.message);
            }
        };
        
        // ==================== 界面渲染 ====================
        async function loadUserData() {
            const user = auth.currentUser;
            if (!user) return;
            
            const userDoc = await db.collection('users').doc(user.uid).get();
            const data = userDoc.data();
            const files = data.files || [];
            
            renderFileList(files);
            updateStats(files);
        }
        
        function renderFileList(files) {
            const container = document.getElementById('fileListContainer');
            
            if (!files || files.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 暂无文件，点击上传</div>';
                return;
            }
            
            // 按时间倒序
            const sorted = [...files].sort((a, b) => b.timestamp - a.timestamp);
            
            let html = '';
            sorted.forEach(file => {
                const date = new Date(file.timestamp).toLocaleString();
                html += `
                    <div class="file-row">
                        <div class="file-info">
                            <span>${file.type?.startsWith('image/') ? '🖼️' : '📄'}</span>
                            <div>
                                <div style="margin-bottom: 4px;">${file.name}</div>
                                <div class="file-meta">
                                    <span>${formatBytes(file.size)}</span>
                                    <span>${date}</span>
                                </div>
                            </div>
                        </div>
                        <div class="file-actions">
                            <button class="btn" onclick="downloadFile('${file.id}')">下载</button>
                            <button class="btn btn-danger" onclick="deleteFile('${file.id}')">删除</button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function updateStats(files) {
            document.getElementById('fileCount').textContent = files.length;
            
            const totalSize = files.reduce((acc, f) => acc + (f.size || 0), 0);
            document.getElementById('storageUsed').textContent = formatBytes(totalSize);
        }
        
        window.refreshFileList = function() {
            loadUserData();
        };
        
        // ==================== 界面切换 ====================
        async function loadMainInterface() {
            const user = auth.currentUser;
            if (!user) return;
            
            authContainer.style.display = 'none';
            mainContainer.style.display = 'block';
            
            document.getElementById('currentUsername').textContent = user.displayName || user.email.split('@')[0];
            document.getElementById('userAvatar').textContent = (user.displayName || user.email).charAt(0).toUpperCase();
            
            await loadUserData();
        }
        
        function logout() {
            auth.signOut();
            authContainer.style.display = 'block';
            mainContainer.style.display = 'none';
            
            // 清空登录输入框
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        }
        
        // ==================== 检查登录状态 ====================
        auth.onAuthStateChanged((user) => {
            if (user) {
                loadMainInterface();
            }
        });
        
        // ==================== 事件绑定 ====================
        function bindEvents() {
            // 登录按钮
            document.getElementById('loginBtn').addEventListener('click', (e) => {
                e.preventDefault();
                handleLogin();
            });
            
            // 注册按钮
            document.getElementById('registerBtn').addEventListener('click', (e) => {
                e.preventDefault();
                handleRegister();
            });
            
            // 显示注册表单
            document.getElementById('showRegisterLink').addEventListener('click', (e) => {
                e.preventDefault();
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                messageBox.style.display = 'none';
            });
            
            // 显示登录表单
            document.getElementById('showLoginLink').addEventListener('click', (e) => {
                e.preventDefault();
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                messageBox.style.display = 'none';
            });
            
            // 退出登录
            document.getElementById('logoutBtn').addEventListener('click', (e) => {
                e.preventDefault();
                logout();
            });
            
            // 刷新按钮
            document.getElementById('refreshBtn').addEventListener('click', (e) => {
                e.preventDefault();
                loadUserData();
            });
            
            // 上传文件
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');
            const selectFileBtn = document.getElementById('selectFileBtn');
            
            selectFileBtn.addEventListener('click', () => {
                fileInput.click();
            });
            
            dropZone.addEventListener('click', (e) => {
                if (e.target !== selectFileBtn) fileInput.click();
            });
            
            fileInput.addEventListener('change', async (e) => {
                for (const file of e.target.files) {
                    await uploadFile(file);
                }
                fileInput.value = '';
            });
            
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.style.borderColor = '#60a5fa';
            });
            
            dropZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                dropZone.style.borderColor = 'rgba(96, 165, 250, 0.3)';
            });
            
            dropZone.addEventListener('drop', async (e) => {
                e.preventDefault();
                dropZone.style.borderColor = 'rgba(96, 165, 250, 0.3)';
                
                for (const file of e.dataTransfer.files) {
                    await uploadFile(file);
                }
            });
            
            // 回车键登录
            document.getElementById('loginPassword').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleLogin();
                }
            });
            
            // 回车键注册
            document.getElementById('regConfirm').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleRegister();
                }
            });
        }
        
        // ==================== 启动应用 ====================
        window.addEventListener('load', () => {
            console.log('应用启动...');
            bindEvents();
        });
    </script>
</body>
</html>
