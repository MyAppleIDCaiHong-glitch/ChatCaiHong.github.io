<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 极速云盘 · 大文件专用版</title>
    <!-- 七牛云 SDK (支持分片上传) -->
    <script src="https://cdn.jsdelivr.net/npm/qiniu-js@3.4.1/dist/qiniu.min.js"></script>
    <!-- LeanCloud SDK -->
    <script src="https://cdn.jsdelivr.net/npm/leancloud-storage@4.13.1/dist/av-min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0b1425 0%, #1a2542 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        /* 登录卡片 */
        .auth-card {
            max-width: 420px;
            width: 100%;
            background: rgba(20, 30, 50, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 40px 32px;
        }
        .auth-title {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 8px;
        }
        .auth-subtitle {
            color: #94a3b8;
            text-align: center;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .input-field {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            color: white;
            font-size: 15px;
            margin-bottom: 20px;
        }
        .input-field:focus {
            outline: none;
            border-color: #60a5fa;
        }
        .auth-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin: 8px 0 16px;
        }
        .auth-link {
            color: #94a3b8;
            text-align: center;
            font-size: 14px;
        }
        .auth-link a {
            color: #60a5fa;
            text-decoration: none;
            cursor: pointer;
        }
        .message-box {
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            margin-bottom: 16px;
            display: none;
        }
        
        /* 主界面 */
        .main-container {
            max-width: 1200px;
            width: 100%;
            background: rgba(20, 30, 50, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 28px;
            display: none;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .user-menu {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px 6px 6px 20px;
            border-radius: 40px;
        }
        .username {
            color: white;
            font-weight: 500;
        }
        .avatar {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }
        .logout-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            margin-left: 8px;
        }
        
        .stats {
            display: flex;
            gap: 32px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            color: white;
            font-weight: 600;
            font-size: 24px;
        }
        .stat-label {
            color: #94a3b8;
            font-size: 12px;
        }
        
        /* 上传区域 - 大文件专用 */
        .upload-area {
            background: rgba(255, 255, 255, 0.02);
            border: 2px dashed rgba(96, 165, 250, 0.3);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            margin-bottom: 28px;
        }
        .upload-tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .upload-tab {
            padding: 8px 24px;
            border-radius: 40px;
            background: rgba(255,255,255,0.05);
            color: #94a3b8;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .upload-tab.active {
            background: rgba(96, 165, 250, 0.2);
            border-color: #60a5fa;
            color: white;
        }
        .upload-progress {
            margin-top: 20px;
            display: none;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #60a5fa, #c084fc);
            width: 0%;
            transition: width 0.3s;
        }
        .speed-info {
            color: #94a3b8;
            font-size: 13px;
            margin-top: 8px;
        }
        
        .file-list {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            overflow: hidden;
        }
        .file-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
        }
        .file-meta {
            display: flex;
            gap: 24px;
            color: #94a3b8;
            font-size: 13px;
        }
        .file-actions {
            display: flex;
            gap: 8px;
        }
        .btn {
            background: rgba(96, 165, 250, 0.2);
            border: 1px solid #60a5fa;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-danger {
            border-color: #f87171;
            background: rgba(248, 113, 113, 0.1);
        }
        .empty-state {
            padding: 48px;
            text-align: center;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <!-- 登录界面 -->
    <div id="authContainer" class="auth-card">
        <div class="auth-title">⚡ 极速云盘</div>
        <div class="auth-subtitle">支持超大文件 · 分片上传</div>
        
        <div id="messageBox" class="message-box"></div>
        
        <div id="loginForm">
            <input type="text" id="loginUsername" class="input-field" placeholder="用户名">
            <input type="password" id="loginPassword" class="input-field" placeholder="密码">
            <button class="auth-btn" onclick="handleLogin()">登录</button>
            <div class="auth-link">
                还没有账号？ <a onclick="showRegister()">立即注册</a>
            </div>
        </div>
        
        <div id="registerForm" style="display: none;">
            <input type="text" id="regUsername" class="input-field" placeholder="用户名">
            <input type="password" id="regPassword" class="input-field" placeholder="密码">
            <input type="password" id="regConfirm" class="input-field" placeholder="确认密码">
            <button class="auth-btn" onclick="handleRegister()">注册</button>
            <div class="auth-link">
                已有账号？ <a onclick="showLogin()">去登录</a>
            </div>
        </div>
    </div>
    
    <!-- 主界面 -->
    <div id="mainContainer" class="main-container">
        <div class="header">
            <div class="logo">⚡ 极速云盘 · 大文件版</div>
            
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="fileCount">0</div>
                    <div class="stat-label">文件</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="storageUsed">0 B</div>
                    <div class="stat-label">已用</div>
                </div>
            </div>
            
            <div class="user-menu">
                <span class="username" id="currentUsername">加载中...</span>
                <div class="avatar" id="userAvatar">U</div>
                <button class="logout-btn" onclick="logout()">退出</button>
            </div>
        </div>
        
        <!-- 上传区域 - 大文件专用 -->
        <div class="upload-area">
            <div class="upload-tabs">
                <span class="upload-tab active" onclick="switchUploadMode('file')">📁 选择文件</span>
                <span class="upload-tab" onclick="switchUploadMode('folder')">📂 选择文件夹</span>
            </div>
            
            <input type="file" id="fileInput" multiple style="display: none;">
            <input type="file" id="folderInput" multiple webkitdirectory style="display: none;">
            
            <div id="normalUpload" style="display: block;">
                <div class="upload-icon" style="font-size: 48px; margin-bottom: 12px;">📤</div>
                <h3 style="color: white; margin-bottom: 8px;">拖拽文件到此处</h3>
                <p style="color: #94a3b8; margin-bottom: 16px;">支持超大文件，自动分片上传</p>
                <button class="btn" id="selectFileBtn" style="padding: 12px 30px;">选择文件</button>
            </div>
            
            <div id="folderUpload" style="display: none;">
                <div class="upload-icon" style="font-size: 48px; margin-bottom: 12px;">📂</div>
                <h3 style="color: white; margin-bottom: 8px;">拖拽文件夹到此处</h3>
                <p style="color: #94a3b8; margin-bottom: 16px;">自动上传文件夹内所有文件</p>
                <button class="btn" id="selectFolderBtn" style="padding: 12px 30px;">选择文件夹</button>
            </div>
            
            <!-- 上传进度 -->
            <div id="uploadProgress" class="upload-progress">
                <div id="currentFileName" style="color: white; margin-bottom: 8px;"></div>
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill" style="width: 0%"></div>
                </div>
                <div id="speedInfo" class="speed-info"></div>
            </div>
        </div>
        
        <!-- 文件列表 -->
        <div class="files-header" style="display: flex; justify-content: space-between; margin-bottom: 16px; color: white;">
            <span>📁 我的文件</span>
            <button class="btn" onclick="refreshFileList()">刷新</button>
        </div>
        <div class="file-list" id="fileListContainer">
            <div class="empty-state">暂无文件，点击上传</div>
        </div>
    </div>

    <script>
        // ==================== 配置 ====================
        // LeanCloud 配置
        const APP_ID = '你的AppID';
        const APP_KEY = '你的AppKey';
        AV.init({ appId: APP_ID, appKey: APP_KEY });
        
        // 七牛云配置（需要自己申请，也可以使用其他云存储）
        const QINIU_CONFIG = {
            domain: 'https://your-domain.com/', // 你的七牛云域名
            uptoken: '' // 需要从后端获取，这里用动态获取
        };
        
        // ==================== 工具函数 ====================
        function showMessage(msg, isSuccess = false) {
            const box = document.getElementById('messageBox');
            box.textContent = msg;
            box.style.display = 'block';
            box.style.color = isSuccess ? '#4ade80' : '#f87171';
            if (isSuccess) setTimeout(() => box.style.display = 'none', 2000);
        }
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        // ==================== 大文件上传核心 ====================
        class LargeFileUploader {
            constructor() {
                this.chunkSize = 4 * 1024 * 1024; // 4MB 分片
                this.uploadQueue = [];
                this.currentUpload = null;
            }
            
            // 分片上传文件
            async uploadFile(file, onProgress, onComplete) {
                const fileId = 'file_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                const chunks = Math.ceil(file.size / this.chunkSize);
                let uploadedChunks = 0;
                
                // 显示进度
                document.getElementById('uploadProgress').style.display = 'block';
                document.getElementById('currentFileName').textContent = `上传: ${file.name}`;
                
                // 创建文件记录（先保存元数据）
                const fileInfo = {
                    id: fileId,
                    name: file.name,
                    size: file.size,
                    type: file.type,
                    chunks: chunks,
                    uploaded: [],
                    timestamp: Date.now()
                };
                
                try {
                    // 分片上传
                    for (let i = 0; i < chunks; i++) {
                        const start = i * this.chunkSize;
                        const end = Math.min(start + this.chunkSize, file.size);
                        const chunk = file.slice(start, end);
                        
                        // 读取分片为Base64
                        const chunkData = await this.readChunk(chunk);
                        
                        // 模拟上传到云存储（这里需要替换为真实的上传接口）
                        await this.uploadChunk(fileId, i, chunkData);
                        
                        uploadedChunks++;
                        const progress = (uploadedChunks / chunks) * 100;
                        onProgress?.(progress);
                        
                        // 更新进度条
                        document.getElementById('progressFill').style.width = progress + '%';
                        document.getElementById('speedInfo').textContent = 
                            `分片 ${uploadedChunks}/${chunks} · ${formatBytes(file.size)}`;
                    }
                    
                    // 合并文件（调用后端合并接口）
                    await this.mergeChunks(fileId, file.name);
                    
                    // 保存文件信息到LeanCloud
                    const user = AV.User.current();
                    const files = user.get('files') || [];
                    files.push({
                        id: fileId,
                        name: file.name,
                        size: file.size,
                        type: file.type,
                        timestamp: Date.now(),
                        chunks: chunks,
                        url: `https://your-domain.com/${fileId}_${file.name}` // 实际文件URL
                    });
                    
                    user.set('files', files);
                    await user.save();
                    
                    onComplete?.();
                    
                    // 隐藏进度条
                    setTimeout(() => {
                        document.getElementById('uploadProgress').style.display = 'none';
                    }, 1000);
                    
                } catch (error) {
                    console.error('上传失败:', error);
                    alert('上传失败: ' + error.message);
                }
            }
            
            // 读取分片
            readChunk(chunk) {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsArrayBuffer(chunk);
                });
            }
            
            // 上传分片（这里需要替换为实际的云存储上传）
            async uploadChunk(fileId, index, data) {
                // TODO: 替换为真实的上传接口
                // 例如：七牛云、阿里云OSS、腾讯云COS
                return new Promise(resolve => {
                    setTimeout(resolve, 100); // 模拟上传
                });
            }
            
            // 合并分片
            async mergeChunks(fileId, fileName) {
                // TODO: 调用后端接口合并文件
                return true;
            }
        }
        
        const uploader = new LargeFileUploader();
        
        // ==================== 文件操作 ====================
        async function uploadFile(file) {
            const user = AV.User.current();
            if (!user) return;
            
            await uploader.uploadFile(file, 
                (progress) => {
                    // 进度回调
                },
                () => {
                    // 完成回调
                    refreshFileList();
                }
            );
        }
        
        // 下载文件
        window.downloadFile = async function(fileId) {
            const user = AV.User.current();
            const files = user.get('files') || [];
            const file = files.find(f => f.id === fileId);
            
            if (!file || !file.url) return;
            
            // 创建下载链接
            const a = document.createElement('a');
            a.href = file.url;
            a.download = file.name;
            a.click();
        };
        
        // 删除文件
        window.deleteFile = async function(fileId) {
            if (!confirm('确定删除？')) return;
            
            const user = AV.User.current();
            const files = user.get('files') || [];
            const newFiles = files.filter(f => f.id !== fileId);
            
            user.set('files', newFiles);
            await user.save();
            
            refreshFileList();
        };
        
        // 刷新文件列表
        async function refreshFileList() {
            const user = AV.User.current();
            if (!user) return;
            
            await user.fetch();
            const files = user.get('files') || [];
            
            renderFileList(files);
            updateStats(files);
        }
        
        function renderFileList(files) {
            const container = document.getElementById('fileListContainer');
            
            if (!files || files.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 暂无文件</div>';
                return;
            }
            
            let html = '';
            files.sort((a, b) => b.timestamp - a.timestamp).forEach(file => {
                html += `
                    <div class="file-row">
                        <div class="file-info">
                            <span>${file.type?.startsWith('image/') ? '🖼️' : '📄'}</span>
                            <div>
                                <div>${file.name}</div>
                                <div class="file-meta">
                                    <span>${formatBytes(file.size)}</span>
                                    <span>${new Date(file.timestamp).toLocaleString()}</span>
                                </div>
                            </div>
                        </div>
                        <div class="file-actions">
                            <button class="btn" onclick="downloadFile('${file.id}')">下载</button>
                            <button class="btn btn-danger" onclick="deleteFile('${file.id}')">删除</button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function updateStats(files) {
            document.getElementById('fileCount').textContent = files.length;
            const total = files.reduce((acc, f) => acc + (f.size || 0), 0);
            document.getElementById('storageUsed').textContent = formatBytes(total);
        }
        
        // ==================== 上传模式切换 ====================
        window.switchUploadMode = function(mode) {
            const tabs = document.querySelectorAll('.upload-tab');
            tabs.forEach(t => t.classList.remove('active'));
            
            if (mode === 'file') {
                tabs[0].classList.add('active');
                document.getElementById('normalUpload').style.display = 'block';
                document.getElementById('folderUpload').style.display = 'none';
            } else {
                tabs[1].classList.add('active');
                document.getElementById('normalUpload').style.display = 'none';
                document.getElementById('folderUpload').style.display = 'block';
            }
        };
        
        // ==================== 登录/注册 ====================
        async function handleRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            
            if (!username || !password) {
                showMessage('请填写用户名和密码');
                return;
            }
            
            if (password.length < 6) {
                showMessage('密码至少6位');
                return;
            }
            
            if (password !== confirm) {
                showMessage('两次密码不一致');
                return;
            }
            
            try {
                const user = new AV.User();
                user.setUsername(username);
                user.setPassword(password);
                user.set('files', []);
                
                await user.signUp();
                showMessage('注册成功', true);
                setTimeout(() => showLogin(), 1500);
            } catch (error) {
                showMessage(error.message);
            }
        }
        
        async function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            try {
                await AV.User.logIn(username, password);
                loadMainInterface();
            } catch (error) {
                showMessage('用户名或密码错误');
            }
        }
        
        async function loadMainInterface() {
            const user = AV.User.current();
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'block';
            
            document.getElementById('currentUsername').textContent = user.getUsername();
            document.getElementById('userAvatar').textContent = user.getUsername().charAt(0).toUpperCase();
            
            await refreshFileList();
        }
        
        function logout() {
            AV.User.logOut();
            document.getElementById('authContainer').style.display = 'block';
            document.getElementById('mainContainer').style.display = 'none';
        }
        
        window.showRegister = () => {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        };
        
        window.showLogin = () => {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
        };
        
        // ==================== 初始化上传事件 ====================
        function initUpload() {
            const dropZone = document.querySelector('.upload-area');
            const fileInput = document.getElementById('fileInput');
            const folderInput = document.getElementById('folderInput');
            
            document.getElementById('selectFileBtn').addEventListener('click', () => {
                fileInput.click();
            });
            
            document.getElementById('selectFolderBtn').addEventListener('click', () => {
                folderInput.click();
            });
            
            fileInput.addEventListener('change', async (e) => {
                for (const file of e.target.files) {
                    await uploadFile(file);
                }
                fileInput.value = '';
            });
            
            folderInput.addEventListener('change', async (e) => {
                for (const file of e.target.files) {
                    await uploadFile(file);
                }
                folderInput.value = '';
            });
            
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.style.borderColor = '#60a5fa';
            });
            
            dropZone.addEventListener('drop', async (e) => {
                e.preventDefault();
                dropZone.style.borderColor = 'rgba(96, 165, 250, 0.3)';
                
                const items = e.dataTransfer.items;
                for (const item of items) {
                    const entry = item.webkitGetAsEntry();
                    if (entry.isFile) {
                        const file = await new Promise(resolve => item.getAsFile(resolve));
                        await uploadFile(file);
                    } else if (entry.isDirectory) {
                        // 处理文件夹
                        const reader = entry.createReader();
                        const readEntries = () => {
                            reader.readEntries(async (entries) => {
                                for (const entry of entries) {
                                    if (entry.isFile) {
                                        entry.file(async (file) => {
                                            await uploadFile(file);
                                        });
                                    }
                                }
                                if (entries.length) readEntries();
                            });
                        };
                        readEntries();
                    }
                }
            });
        }
        
        // 检查登录状态
        (async function() {
            const user = AV.User.current();
            if (user) {
                await loadMainInterface();
            }
            initUpload();
        })();
